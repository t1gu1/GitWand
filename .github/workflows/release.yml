name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Build & Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euxo pipefail
          sudo apt-get update
          # Full Tauri 2 prereqs (https://v2.tauri.app/start/prerequisites/#linux).
          # `libglib2.0-dev` + `libsoup-3.0-dev` are required by glib-sys / soup3-sys
          # on Ubuntu 22.04 — libwebkit2gtk-4.1-dev no longer pulls them transitively
          # in current GHA runner images. `libayatana-appindicator3-dev` is the
          # supported replacement for the deprecated `libappindicator3-dev`.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            patchelf
          # Diagnostic — if these fail the build will fail with a clear error
          # before tauri-action runs cargo, instead of a cryptic glib-sys panic.
          echo "=== pkg-config search paths ==="
          pkg-config --variable=pc_path pkg-config
          echo "=== probe glib stack ==="
          for pkg in glib-2.0 gobject-2.0 gio-2.0 cairo gdk-pixbuf-2.0 pango \
                    gtk+-3.0 webkit2gtk-4.1 javascriptcoregtk-4.1 \
                    libsoup-3.0 ayatana-appindicator3-0.1 librsvg-2.0; do
            if version=$(pkg-config --modversion "$pkg" 2>/dev/null); then
              printf '  ✓ %-32s %s\n' "$pkg" "$version"
            else
              printf '  ✗ %-32s MISSING\n' "$pkg"
              missing=1
            fi
          done
          if [ "${missing:-0}" = "1" ]; then
            echo "::error::One or more Tauri Linux prereqs are missing — fix the apt-get install list above"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @gitwand/core run build

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/gitwand-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Import certificate
          echo -n "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12 2>/dev/null || \
          echo -n "$APPLE_CERTIFICATE" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Build release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing & notarization
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: GitWand ${{ github.ref_name }}
          releaseBody: |
            ## GitWand ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `.dmg` |
            | Linux | `.deb` · `.AppImage` |
            | Windows | `.msi` · `.exe` |

            See the [changelog](https://github.com/devlint/GitWand/commits/${{ github.ref_name }}) for details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: true

      # GitHub Releases API occasionally returns 500 on asset uploads,
      # especially when the matrix jobs upload in parallel. Re-upload any
      # asset that is missing from the release (idempotent, safe to retry).
      - name: Verify & re-upload missing assets
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Collect assets already on the release
          uploaded=$(gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '[.assets[].name]' 2>/dev/null || echo '[]')

          # Find all built artifacts for this platform
          artifact_dir="apps/desktop/target/release/bundle"
          [ -d "$artifact_dir" ] || exit 0

          # Walk every signable artifact (installers + .sig files)
          find "$artifact_dir" \
            \( -name "*.deb" -o -name "*.AppImage" \
            -o -name "*.rpm" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.nsis" \
            -o -name "*.dmg" \
            -o -name "*.sig" \) \
            -type f | while read -r file; do
              name="$(basename "$file")"
              if echo "$uploaded" | grep -qF "\"$name\""; then
                echo "✓ already uploaded: $name"
              else
                echo "⚠ missing from release, uploading: $name"
                for attempt in 1 2 3; do
                  gh release upload "$TAG" "$file" --repo "$REPO" --clobber && break
                  echo "  attempt $attempt failed, retrying in 10s…"
                  sleep 10
                done
              fi
          done

  # After all platform builds succeed, generate update.json and publish to GitHub Pages
  publish-update-manifest:
    name: Publish update manifest
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Download update manifest from release (contains real signatures)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p website/public/update
          # Retry up to 3 times — the release matrix may have signaled success
          # before tauri-action finalized the merged latest.json on the release.
          for attempt in 1 2 3; do
            if gh release download ${{ github.ref_name }} \
                --pattern "latest.json" \
                --output update.json \
                --repo ${{ github.repository }} 2>&1; then
              break
            fi
            echo "::warning::latest.json not yet available on release ${{ github.ref_name }} (attempt $attempt/3) — sleeping 15s"
            sleep 15
          done
          [ -s update.json ] || { echo "::error::latest.json missing or empty on release ${{ github.ref_name }} after retries"; exit 1; }
          # Sanity check: darwin-aarch64 is the primary macOS target — its
          # absence means the macOS matrix entry didn't make it into the
          # merged manifest, and shipping this would silently break the
          # in-app updater for Apple Silicon users.
          if ! grep -q '"darwin-aarch64"' update.json; then
            echo "::error::latest.json has no darwin-aarch64 entry — auto-update would be broken for Apple Silicon"
            cat update.json
            exit 1
          fi
          cp update.json website/public/update/latest.json
          echo "::notice::Published $(jq -r .version update.json) auto-update manifest from release ${{ github.ref_name }}"

      - name: Build website with update manifest
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter gitwand-website build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
