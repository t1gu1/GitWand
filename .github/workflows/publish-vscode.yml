name: Publish VS Code extension

# Publishes `gitwand-vscode` to the VS Code Marketplace.
#
# The extension is versioned independently of the npm packages (see
# packages/vscode/CLAUDE.md), so it uses its own tag prefix `vscode-v*` —
# this never collides with the `v*.*.*` tags that drive publish.yml.
#
# Trigger it by pushing a tag (e.g. `vscode-v1.2.0`) or manually via the
# Actions tab. A manual run with dry_run=true builds and uploads the .vsix as
# an artifact without publishing — useful for a first-time sanity check.
#
# Required secret: VSCE_PAT — a VS Code Marketplace Personal Access Token for
# the `gitwand` publisher. vsce reads it from the environment automatically.

on:
  push:
    tags:
      - 'vscode-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (package only, do not publish)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  publish:
    name: Publish gitwand-vscode to the Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # esbuild bundles @gitwand/core into the extension, so core must be
      # built first (the bundle resolves core's compiled dist/ entry).
      - name: Build core (bundled into the extension)
        run: pnpm --filter @gitwand/core run build

      - name: Type-check the extension
        run: pnpm --filter gitwand-vscode run typecheck

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#vscode-v}"
          VER=$(node -p "require('./packages/vscode/package.json').version")
          if [ "$VER" != "$TAG" ]; then
            echo "::error::gitwand-vscode version ${VER} does not match tag vscode-v${TAG}"
            exit 1
          fi
          echo "gitwand-vscode matches tag vscode-v${TAG}"

      - name: Package (.vsix)
        run: pnpm --filter gitwand-vscode run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitwand-vscode-vsix
          path: packages/vscode/*.vsix

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        working-directory: packages/vscode
        env:
          # vsce authenticates from the VSCE_PAT environment variable.
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret is not set — cannot publish."
            exit 1
          fi
          # Publish the exact .vsix built in the Package step (core is already
          # bundled in, so the package is self-contained).
          pnpm exec vsce publish --packagePath gitwand-vscode-*.vsix
