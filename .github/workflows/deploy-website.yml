name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  # Allow manual re-deploy without touching website/ (e.g. to republish
  # /update/latest.json after fixing a workflow bug).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Pull the auto-update manifest from the latest stable release so that
      # any deploy of `website/` (including blog posts, doc tweaks, roadmap edits)
      # republishes /update/latest.json — without this step, every push to main
      # that touches website/ would overwrite the Pages site and drop the
      # auto-update manifest, breaking the in-app updater for users.
      - name: Pull auto-update manifest from latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p website/public/update
          # `gh release view --json tagName` returns the latest non-prerelease tag.
          LATEST_TAG=$(gh release view --json tagName --jq .tagName --repo ${{ github.repository }} 2>/dev/null || true)
          if [ -z "$LATEST_TAG" ]; then
            echo "::warning::No release found yet — skipping latest.json (auto-update will be unavailable until first release)"
            exit 0
          fi
          echo "Pulling latest.json from release $LATEST_TAG"
          if ! gh release download "$LATEST_TAG" \
              --pattern "latest.json" \
              --output website/public/update/latest.json \
              --repo ${{ github.repository }}; then
            echo "::error::latest.json missing from release $LATEST_TAG — auto-update will be broken"
            exit 1
          fi
          [ -s website/public/update/latest.json ] || { echo "::error::latest.json downloaded but empty"; exit 1; }
          if ! grep -q '"darwin-aarch64"' website/public/update/latest.json; then
            echo "::error::latest.json has no darwin-aarch64 entry"
            cat website/public/update/latest.json
            exit 1
          fi
          echo "::notice::Published $(jq -r .version website/public/update/latest.json) auto-update manifest"

      - name: Build website
        run: pnpm --filter gitwand-website build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
