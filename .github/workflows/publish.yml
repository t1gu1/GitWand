name: Publish npm packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        default: 'false'

permissions:
  contents: read
  id-token: write  # Required for npm provenance attestations

env:
  # Tag name without the leading "v" (e.g. "1.9.0"). Evaluated per-job so
  # it works for both push-tag and workflow_dispatch triggers.
  PKG_VERSION: ${{ github.ref_name != '' && startsWith(github.ref_name, 'v') && github.ref_name || '' }}

jobs:
  publish:
    name: Publish @gitwand/{core,mcp,cli} to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core (dependency of cli + mcp)
        run: pnpm --filter @gitwand/core run build

      - name: Build cli and mcp
        run: |
          pnpm --filter @gitwand/cli run build
          pnpm --filter @gitwand/mcp run build

      - name: Verify tag matches package.json versions
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for pkg in core cli mcp; do
            VER=$(node -p "require('./packages/${pkg}/package.json').version")
            if [ "$VER" != "$TAG" ]; then
              echo "::error::@gitwand/${pkg} version ${VER} does not match tag ${TAG}"
              exit 1
            fi
          done
          echo "All three packages match tag v${TAG}"

      - name: Publish @gitwand/core
        working-directory: packages/core
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "::notice::${PKG}@${VER} already on npm, skipping"
            exit 0
          fi
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY RUN — would publish ${PKG}@${VER}"
            pnpm publish --access public --no-git-checks --dry-run
          else
            pnpm publish --access public --no-git-checks --provenance
          fi

      - name: Publish @gitwand/cli
        working-directory: packages/cli
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "::notice::${PKG}@${VER} already on npm, skipping"
            exit 0
          fi
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY RUN — would publish ${PKG}@${VER}"
            pnpm publish --access public --no-git-checks --dry-run
          else
            pnpm publish --access public --no-git-checks --provenance
          fi

      - name: Publish @gitwand/mcp
        working-directory: packages/mcp
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "::notice::${PKG}@${VER} already on npm, skipping"
            exit 0
          fi
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY RUN — would publish ${PKG}@${VER}"
            pnpm publish --access public --no-git-checks --dry-run
          else
            pnpm publish --access public --no-git-checks --provenance
          fi

  smoke-test:
    name: Smoke test published CLI
    needs: publish
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for npm registry propagation
        run: node -e "setTimeout(() => process.exit(0), 30000)"

      - name: npx @gitwand/cli --help
        shell: bash
        run: npx -y @gitwand/cli@${GITHUB_REF_NAME#v} --help

      - name: Probe @gitwand/mcp (stdio server — killed after 5s)
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # MCP starts a stdio server; we just check the package resolves and can be invoked.
          # Portable timeout via node — macOS/Windows runners don't ship GNU `timeout`.
          # We track `killed` so that a SIGTERM-induced non-zero exit code is not treated as failure.
          node -e "
            const { spawn } = require('child_process');
            const c = spawn('npx', ['-y', '@gitwand/mcp@${VER}', '--cwd', process.cwd()], {
              stdio: ['ignore', 'inherit', 'inherit'],
              shell: process.platform === 'win32',
            });
            let killed = false;
            c.on('error', (e) => { console.error(e); process.exit(1); });
            c.on('exit', (code) => {
              if (killed) { process.exit(0); }
              process.exit(code === null || code === 0 ? 0 : 1);
            });
            setTimeout(() => { killed = true; c.kill(); }, 5000);
          "

  # ── MCP Registry publish ─────────────────────────────────────────────────
  # Triggered only on tag push (not workflow_dispatch) since the registry
  # publish requires an exact @gitwand/mcp version already live on npm.
  #
  # Pre-requisite secret: MCP_PUBLISHER_TOKEN — a GitHub PAT with at minimum
  # `read:user` scope, owned by an account that has write access to the
  # devlint/GitWand repository on GitHub. The registry uses this to verify
  # the publisher is authorised to claim the `io.github.devlint/gitwand` name.
  publish-mcp-registry:
    name: Publish io.github.devlint/gitwand to MCP Registry
    needs: [publish, smoke-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher (pre-built binary)
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          echo "Downloading mcp-publisher for ${OS}/${ARCH}…"
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz" \
            | tar -xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --help

      - name: Wait for @gitwand/mcp to propagate on npm
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "Polling npm for @gitwand/mcp@${VER}…"
          for i in $(seq 1 24); do
            if npm view "@gitwand/mcp@${VER}" version 2>/dev/null | grep -q "${VER}"; then
              echo "✓ @gitwand/mcp@${VER} is live on npm"
              exit 0
            fi
            echo "  attempt ${i}/24 — not yet available, waiting 30s…"
            sleep 30
          done
          echo "::error::@gitwand/mcp@${VER} did not appear on npm within 12 minutes"
          exit 1

      - name: Authenticate with MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: packages/mcp
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "Publishing io.github.devlint/gitwand v${VER} to MCP Registry…"
          mcp-publisher publish
          echo "✓ MCP Registry publish complete"

      - name: Remove PUBLISH-TO-REGISTRY.md note about automation
        # The doc said "Consider automating this once the flow is proven manually."
        # We have. Remove that line so it doesn't confuse future maintainers.
        run: |
          sed -i '/Consider automating this in the CI publish workflow/d' packages/mcp/PUBLISH-TO-REGISTRY.md
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          if ! git diff --quiet packages/mcp/PUBLISH-TO-REGISTRY.md; then
            git add packages/mcp/PUBLISH-TO-REGISTRY.md
            git commit -m "docs(mcp): remove manual publish note — CI now handles registry"
            git push origin HEAD:main
          fi
